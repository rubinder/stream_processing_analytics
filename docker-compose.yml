services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  schema-registry:
    image: confluentinc/cp-schema-registry:8.0.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  flink-jobmanager:
    image: flink:2.2.0-java21
    container_name: flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8082:8081"
      - "9249:9249"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        execution.checkpointing.interval: 30s
        state.backend.type: rocksdb
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.mode: EXACTLY_ONCE
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY: http://schema-registry:8081
    volumes:
      - ./flink/position-engine/target:/jars/position-engine
      - ./flink/risk-engine/target:/jars/risk-engine
      - flink-checkpoints:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/v1/overview || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  flink-taskmanager:
    image: flink:2.2.0-java21
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    ports:
      - "9250:9250"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend.type: rocksdb
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY: http://schema-registry:8081
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints

  pinot-zk:
    image: zookeeper:3.9
    container_name: pinot-zk
    ports:
      - "2181:2181"

  pinot-controller:
    image: apachepinot/pinot:1.5.0
    container_name: pinot-controller
    depends_on:
      - pinot-zk
    command: StartController -zkAddress pinot-zk:2181 -clusterName pinot
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  pinot-broker:
    image: apachepinot/pinot:1.5.0
    container_name: pinot-broker
    depends_on:
      pinot-controller:
        condition: service_healthy
    command: StartBroker -zkAddress pinot-zk:2181 -clusterName pinot
    ports:
      - "8099:8099"

  pinot-server:
    image: apachepinot/pinot:1.5.0
    container_name: pinot-server
    depends_on:
      pinot-controller:
        condition: service_healthy
    command: StartServer -zkAddress pinot-zk:2181 -clusterName pinot

volumes:
  flink-checkpoints:
